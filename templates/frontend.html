<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicSpot - Studio Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .calendar-day { transition: all 0.2s ease; cursor: pointer; }
        .calendar-day:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-[#131313] text-[#e5e2e1]">

<!-- Login Screen -->
<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80">
    <div class="bg-[#20201f] rounded-2xl p-8 max-w-md w-full mx-4 border border-[#ebc23e]/30">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-[#ebc23e] rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-5xl text-[#3c2f00]">music_note</span>
            </div>
            <h2 class="text-3xl font-bold text-[#fff5e1]">MusicSpot</h2>
            <p class="text-[#d0c6ae] text-sm">Studio Maestro Login</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-[#99907b] mb-1">Select Teacher</label>
                <select id="loginEmail" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3 text-[#e5e2e1]">
                    <option value="jaimit@musicspot.com">🎹 Jaimit Sir (Keyboard & Guitar)</option>
                    <option value="jay@musicspot.com">🎸 Jay Sir (Guitar Only)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-[#99907b] mb-1">Password</label>
                <input type="password" id="loginPassword" value="studio123" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3 text-[#e5e2e1]">
            </div>
            <label class="flex items-center gap-2">
                <input type="checkbox" id="rememberMe" class="accent-[#ebc23e]">
                <span class="text-sm text-[#99907b]">Remember me</span>
            </label>
            <button onclick="login()" class="w-full py-3 bg-[#ebc23e] text-[#3c2f00] font-bold rounded-full hover:shadow-lg transition">
                Enter Studio
            </button>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden">
    <header class="fixed top-0 w-full bg-[#131313] shadow-lg z-40">
        <div class="flex justify-between items-center px-6 h-16 max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-[#ebc23e]">library_music</span>
                <h1 class="text-2xl font-bold text-[#fff5e1]">MusicSpot</h1>
                <span id="teacherInstrumentBadge" class="text-xs bg-[#ebc23e]/20 px-2 py-1 rounded-full"></span>
            </div>
            <div class="flex items-center gap-4">
                <span id="teacherName" class="text-sm text-[#d0c6ae]"></span>
                <button onclick="logout()" class="text-xs border border-[#4d4634] px-3 py-1 rounded-full hover:bg-[#ebc23e]/20">Logout</button>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-20 px-6 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-4xl font-bold text-[#fff5e1]">Welcome, <span id="welcomeName"></span></h2>
            <p class="text-[#d0c6ae]">Manage attendance, track progress, and send reminders</p>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-[#2a2a2a] rounded-xl p-4">
                <div class="text-2xl font-bold text-[#ebc23e]" id="statStudents">0</div>
                <div class="text-xs text-[#99907b]">Total Students</div>
            </div>
            <div class="bg-[#2a2a2a] rounded-xl p-4">
                <div class="text-2xl font-bold text-[#ebc23e]" id="statUnpaid">0</div>
                <div class="text-xs text-[#99907b]">Unpaid Fees</div>
            </div>
            <div class="bg-[#2a2a2a] rounded-xl p-4">
                <div class="text-2xl font-bold text-[#ebc23e]" id="statRevenue">0</div>
                <div class="text-xs text-[#99907b]">Revenue (₹)</div>
            </div>
            <div class="bg-[#2a2a2a] rounded-xl p-4">
                <div class="text-2xl font-bold text-[#ebc23e]" id="statAttendance">0</div>
                <div class="text-xs text-[#99907b]">Attendance This Month</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 border-b border-[#4d4634] mb-6">
            <button onclick="switchTab('attendance')" id="tabAttendance" class="px-4 py-2 text-sm font-bold text-[#ebc23e] border-b-2 border-[#ebc23e]">📅 Mark Attendance</button>
            <button onclick="switchTab('students')" id="tabStudents" class="px-4 py-2 text-sm font-bold text-[#99907b]">👥 Students</button>
            <button onclick="switchTab('payments')" id="tabPayments" class="px-4 py-2 text-sm font-bold text-[#99907b]">💰 Payments</button>
        </div>

        <!-- Attendance Tab -->
        <div id="attendanceTab">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Today's Attendance - <span id="todayDate"></span></h3>
                <button onclick="addStudent()" class="bg-[#ebc23e] text-[#3c2f00] px-4 py-2 rounded-lg text-sm font-bold">+ Add Student</button>
            </div>
            <div id="attendanceList" class="space-y-3"></div>
        </div>

        <!-- Students Tab -->
        <div id="studentsTab" class="hidden">
            <div id="studentsList" class="space-y-4"></div>
        </div>

        <!-- Payments Tab -->
        <div id="paymentsTab" class="hidden">
            <div id="paymentsList" class="space-y-3"></div>
        </div>
    </main>
</div>

<script>
    let currentTeacher = null;
    let students = [];

    async function apiCall(endpoint, method = 'GET', data = null) {
        const options = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
        if (data) options.body = JSON.stringify(data);
        const response = await fetch(`/api${endpoint}`, options);
        if (response.status === 401) { logout(); throw new Error('Session expired'); }
        return response.json();
    }

    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        
        try {
            const response = await fetch('/api/login', {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, rememberMe })
            });
            const data = await response.json();
            
            if (data.success) {
                currentTeacher = data.teacher;
                
                // Update UI based on teacher's instrument
                let instrumentText = '';
                if (currentTeacher.instrument === 'both') {
                    instrumentText = '🎹 Keyboard + 🎸 Guitar';
                } else if (currentTeacher.instrument === 'guitar') {
                    instrumentText = '🎸 Guitar Only';
                }
                document.getElementById('teacherInstrumentBadge').innerHTML = instrumentText;
                document.getElementById('teacherName').innerText = currentTeacher.name;
                document.getElementById('welcomeName').innerText = currentTeacher.name.split(' ')[0];
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else {
                alert('Login failed: ' + (data.error || 'Unknown error'));
            }
        } catch (error) {
            alert('Server error. Make sure backend is running on port 3000');
        }
    }

    async function logout() {
        await apiCall('/logout', 'POST');
        location.reload();
    }

    async function loadData() {
        await loadStats();
        await loadTodayAttendance();
        await loadStudents();
        await loadPayments();
    }

    async function loadStats() {
        const stats = await apiCall('/stats');
        document.getElementById('statStudents').innerText = stats.stats.totalStudents;
        document.getElementById('statUnpaid').innerText = stats.stats.unpaidStudents;
        document.getElementById('statRevenue').innerText = stats.stats.totalRevenue;
        document.getElementById('statAttendance').innerText = stats.stats.thisMonthAttendance;
    }

    async function loadTodayAttendance() {
        const today = new Date();
        document.getElementById('todayDate').innerHTML = today.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        const data = await apiCall('/attendance/today');
        const container = document.getElementById('attendanceList');
        
        if (data.students.length === 0) {
            container.innerHTML = '<div class="bg-[#2a2a2a] rounded-xl p-8 text-center text-[#99907b]">No students yet. Click "Add Student" to get started!</div>';
            return;
        }
        
        container.innerHTML = data.students.map(s => `
            <div class="bg-[#2a2a2a] rounded-xl p-4 flex flex-wrap justify-between items-center gap-4">
                <div>
                    <h4 class="font-bold text-lg">${escapeHtml(s.name)}</h4>
                    <p class="text-sm text-[#d0c6ae]">${escapeHtml(s.course)} | ${s.feePlan === '12days' ? '12 days/mo (₹3,000)' : s.feePlan === '8days' ? '8 days/mo (₹2,200)' : '3 months (₹7,500)'}</p>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="text-xs text-[#ebc23e]">Progress: ${s.progress}</div>
                        <div class="text-xs ${s.remaining === 0 ? 'text-red-400' : 'text-green-400'}">${s.remaining} days left</div>
                    </div>
                    ${s.completed ? '<div class="text-xs text-red-400 mt-1">⚠️ Session completed! New session starts tomorrow</div>' : ''}
                </div>
                <div class="flex gap-2">
                    ${!s.attendedToday ? 
                        `<button onclick="markAttendance(${s.id})" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-bold">✅ Mark Present</button>` :
                        `<span class="bg-green-600/30 px-4 py-2 rounded-lg text-sm">✅ Already Marked Today</span>`
                    }
                    <button onclick="showCalendar(${s.id})" class="bg-[#ebc23e]/20 hover:bg-[#ebc23e]/30 px-3 py-2 rounded-lg text-sm">📅 View Calendar</button>
                    ${s.feeStatus === 'unpaid' ? `<button onclick="sendReminder(${s.id}, 'payment')" class="bg-red-600/20 hover:bg-red-600/30 px-3 py-2 rounded-lg text-sm">💬 Reminder</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    async function markAttendance(studentId) {
        const today = new Date().toISOString().split('T')[0];
        const result = await apiCall('/attendance/mark', 'POST', { studentId, date: today, status: true });
        
        if (result.alert) {
            alert(result.alert);
            if (result.sessionCompleted) {
                const confirmReminder = confirm(`${result.studentName} completed their session! Send WhatsApp notification to parents?`);
                if (confirmReminder) await sendReminder(studentId, 'completion');
            }
        } else {
            alert(`✅ Attendance marked for ${result.studentName}\nProgress: ${result.daysPresent}/${result.totalRequired} days (${result.attendancePercentage}%)`);
        }
        loadTodayAttendance();
        loadStats();
        loadStudents();
    }

    async function showCalendar(studentId) {
        const student = students.find(s => s.id === studentId);
        const currentDate = new Date();
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth() + 1;
        
        const data = await apiCall(`/attendance/calendar/${studentId}?year=${year}&month=${month}`);
        
        const daysInMonth = new Date(year, month, 0).getDate();
        let calendarHtml = `<div class="bg-[#2a2a2a] rounded-xl p-6 max-w-2xl mx-auto">
            <h3 class="text-2xl font-bold mb-2">📅 ${data.monthName} ${year}</h3>
            <p class="text-[#ebc23e] mb-4">${data.studentName} - ${student?.course || 'Music'}</p>
            <div class="grid grid-cols-7 gap-2 mb-4 text-center text-xs text-[#99907b]">
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
            </div>
            <div class="grid grid-cols-7 gap-2">`;
        
        const firstDay = new Date(year, month - 1, 1).getDay();
        const startOffset = firstDay === 0 ? 6 : firstDay - 1;
        
        for (let i = 0; i < startOffset; i++) calendarHtml += `<div class="p-2"></div>`;
        
        for (let day = 1; day <= daysInMonth; day++) {
            const marked = data.calendar[day];
            const isPresent = marked && marked.status;
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            calendarHtml += `
                <div class="calendar-day p-2 text-center rounded-lg ${isPresent ? 'bg-green-600/30 border border-green-500' : 'bg-[#1a1a1a]'}" 
                     onclick="markAttendanceOnDate(${studentId}, '${dateStr}')">
                    <div class="text-sm font-bold">${day}</div>
                    ${isPresent ? '<div class="text-xs text-green-400">✓</div>' : '<div class="text-xs text-[#666]">—</div>'}
                </div>`;
        }
        
        calendarHtml += `</div>
            <div class="mt-6 p-4 bg-[#1a1a1a] rounded-lg">
                <div class="flex justify-between items-center">
                    <div><span class="text-[#ebc23e]">📊 Progress:</span> ${data.daysPresent}/${data.totalRequired} days</div>
                    <div><span class="text-[#ebc23e]">💰 Fee:</span> ${data.feeText} ${data.feeStatus === 'paid' ? '✅ Paid' : '⚠️ Pending'}</div>
                </div>
                <div class="w-full bg-[#333] rounded-full h-2 mt-2">
                    <div class="bg-[#ebc23e] h-2 rounded-full" style="width: ${data.attendancePercentage}%"></div>
                </div>
                ${data.sessionCompleted ? '<div class="text-red-400 text-sm mt-2">🎉 Session completed! New session starts tomorrow</div>' : ''}
                <div class="flex gap-2 mt-4">
                    <button onclick="closeModal()" class="flex-1 border border-[#4d4634] py-2 rounded-lg">Close</button>
                    <button onclick="sendReminder(${studentId}, 'attendance')" class="flex-1 bg-[#ebc23e] text-[#3c2f00] py-2 rounded-lg">Send Progress Report</button>
                </div>
            </div>
        </div>`;
        
        showModal(calendarHtml);
    }

    async function markAttendanceOnDate(studentId, date) {
        const result = await apiCall('/attendance/mark', 'POST', { studentId, date, status: true });
        alert(`✅ Attendance marked for ${date}`);
        showCalendar(studentId);
        loadTodayAttendance();
        loadStats();
    }

    async function loadStudents() {
        const data = await apiCall('/students');
        students = data.students;
        const container = document.getElementById('studentsList');
        
        if (students.length === 0) {
            container.innerHTML = '<div class="bg-[#2a2a2a] rounded-xl p-8 text-center text-[#99907b]">No students added yet.</div>';
            return;
        }
        
        container.innerHTML = students.map(s => `
            <div class="bg-[#2a2a2a] rounded-xl p-4">
                <div class="flex justify-between items-start">
                    <div>
                        <h4 class="font-bold text-lg">${escapeHtml(s.name)}</h4>
                        <p class="text-sm text-[#d0c6ae]">${escapeHtml(s.course)} | ${s.feePlan === '12days' ? '12 days/mo (₹3,000)' : s.feePlan === '8days' ? '8 days/mo (₹2,200)' : '3 months (₹7,500)'}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs px-2 py-1 rounded-full ${s.feeStatus === 'paid' ? 'bg-green-600/30 text-green-300' : 'bg-red-600/30 text-red-300'}">
                            ${s.feeStatus === 'paid' ? '✅ Paid' : '⚠️ Unpaid'}
                        </span>
                    </div>
                </div>
                <div class="mt-2 text-sm">📞 ${escapeHtml(s.contact)} ${s.parentContact ? `| 👪 ${escapeHtml(s.parentContact)}` : ''}</div>
                <div class="mt-2">
                    <div class="text-xs text-[#ebc23e]">Progress: ${s.attendanceThisMonth}/${s.totalDaysNeeded} days (${s.attendancePercentage}%)</div>
                    <div class="w-full bg-[#333] rounded-full h-1.5 mt-1">
                        <div class="bg-[#ebc23e] h-1.5 rounded-full" style="width: ${s.attendancePercentage}%"></div>
                    </div>
                </div>
                ${s.notes ? `<div class="text-xs text-[#99907b] mt-2">📝 ${escapeHtml(s.notes)}</div>` : ''}
                <div class="flex gap-2 mt-3">
                    <button onclick="deleteStudent(${s.id})" class="text-xs bg-red-600/20 hover:bg-red-600/30 px-3 py-1 rounded-full">Delete</button>
                </div>
            </div>
        `).join('');
    }

    async function loadPayments() {
        const data = await apiCall('/payments/unpaid');
        const container = document.getElementById('paymentsList');
        
        if (data.unpaidStudents.length === 0) {
            container.innerHTML = '<div class="bg-[#2a2a2a] rounded-xl p-8 text-center text-green-400">✅ All fees are up to date!</div>';
            return;
        }
        
        container.innerHTML = data.unpaidStudents.map(s => `
            <div class="bg-[#2a2a2a] rounded-xl p-4 flex flex-wrap justify-between items-center gap-4 border-l-4 border-red-500">
                <div>
                    <h4 class="font-bold">${escapeHtml(s.name)}</h4>
                    <p class="text-sm">${escapeHtml(s.course)} | ₹${s.feeAmount}</p>
                    <p class="text-xs text-[#99907b]">📞 ${escapeHtml(s.contact)} | 👪 ${escapeHtml(s.parentContact || 'No parent contact')}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="markPaid(${s.id})" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-bold">✅ Mark Paid</button>
                    <button onclick="sendReminder(${s.id}, 'payment')" class="bg-[#25D366] hover:bg-[#20bd59] text-white px-4 py-2 rounded-lg text-sm font-bold">📱 WhatsApp</button>
                </div>
            </div>
        `).join('');
    }

    async function markPaid(studentId) {
        await apiCall(`/students/${studentId}/payment`, 'PATCH', { feeStatus: 'paid' });
        alert('✅ Payment marked as paid!');
        loadStats();
        loadPayments();
        loadStudents();
    }

    async function sendReminder(studentId, type) {
        const data = await apiCall('/whatsapp/reminder', 'POST', { studentId, type });
        window.open(data.whatsappUrl, '_blank');
    }

    async function deleteStudent(studentId) {
        if (confirm('Delete this student? This cannot be undone.')) {
            await apiCall(`/students/${studentId}`, 'DELETE');
            loadData();
        }
    }

    function addStudent() {
        // Get available instruments based on teacher
        let instrumentOptions = '';
        if (currentTeacher.instrument === 'both') {
            instrumentOptions = `
                <option value="Keyboard">🎹 Keyboard</option>
                <option value="Guitar">🎸 Guitar</option>
            `;
        } else {
            instrumentOptions = `<option value="Guitar">🎸 Guitar</option>`;
        }
        
        const modalHtml = `<div class="bg-[#2a2a2a] rounded-xl p-6 max-w-md w-full">
            <h3 class="text-2xl font-bold mb-4">Add New Student</h3>
            <form id="addStudentForm" class="space-y-4">
                <input type="text" id="name" placeholder="Full Name" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3" required>
                <input type="text" id="contact" placeholder="Contact (Phone/Email)" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3" required>
                <input type="text" id="parentContact" placeholder="Parent WhatsApp Number (Optional)" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3">
                <select id="course" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3" required>
                    <option value="">Select Course/Instrument</option>
                    ${instrumentOptions}
                </select>
                <select id="feePlan" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3">
                    <option value="12days">12 days/month - ₹3,000</option>
                    <option value="8days">8 days/month - ₹2,200</option>
                    <option value="3months">3 months (36 classes) - ₹7,500</option>
                </select>
                <textarea id="notes" placeholder="Notes (Optional)" rows="2" class="w-full bg-[#0e0e0e] border border-[#4d4634] rounded-lg p-3"></textarea>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 border border-[#4d4634] py-2 rounded-lg">Cancel</button>
                    <button type="submit" class="flex-1 bg-[#ebc23e] text-[#3c2f00] py-2 rounded-lg font-bold">Save</button>
                </div>
            </form>
        </div>`;
        showModal(modalHtml);
        
        document.getElementById('addStudentForm').onsubmit = async (e) => {
            e.preventDefault();
            const course = document.getElementById('course').value;
            if (!course) {
                alert('Please select a course/instrument');
                return;
            }
            await apiCall('/students', 'POST', {
                name: document.getElementById('name').value,
                contact: document.getElementById('contact').value,
                parentContact: document.getElementById('parentContact').value,
                course: course,
                feePlan: document.getElementById('feePlan').value,
                notes: document.getElementById('notes').value
            });
            closeModal();
            loadData();
        };
    }

    function switchTab(tab) {
        document.getElementById('attendanceTab').classList.add('hidden');
        document.getElementById('studentsTab').classList.add('hidden');
        document.getElementById('paymentsTab').classList.add('hidden');
        
        document.getElementById('tabAttendance').classList.remove('text-[#ebc23e]', 'border-b-2', 'border-[#ebc23e]');
        document.getElementById('tabStudents').classList.remove('text-[#ebc23e]', 'border-b-2', 'border-[#ebc23e]');
        document.getElementById('tabPayments').classList.remove('text-[#ebc23e]', 'border-b-2', 'border-[#ebc23e]');
        
        if (tab === 'attendance') {
            document.getElementById('attendanceTab').classList.remove('hidden');
            document.getElementById('tabAttendance').classList.add('text-[#ebc23e]', 'border-b-2', 'border-[#ebc23e]');
            loadTodayAttendance();
        } else if (tab === 'students') {
            document.getElementById('studentsTab').classList.remove('hidden');
            document.getElementById('tabStudents').classList.add('text-[#ebc23e]', 'border-b-2', 'border-[#ebc23e]');
            loadStudents();
        } else {
            document.getElementById('paymentsTab').classList.remove('hidden');
            document.getElementById('tabPayments').classList.add('text-[#ebc23e]', 'border-b-2', 'border-[#ebc23e]');
            loadPayments();
        }
    }

    function showModal(content) {
        let modal = document.getElementById('dynamicModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'dynamicModal';
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4';
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };
            document.body.appendChild(modal);
        }
        modal.innerHTML = content;
        modal.classList.remove('hidden');
    }

    function closeModal() {
        const modal = document.getElementById('dynamicModal');
        if (modal) modal.remove();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
</script>
